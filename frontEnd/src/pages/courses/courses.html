<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Courses</title>
  <link href="../../style/output.css" rel="stylesheet"> <!-- Tailwind CSS -->
  <script src="../../assets/js/courses.js" defer></script> <!-- Courses JS -->
</head>
<body class="flex flex-col min-h-screen bg-gray-50 text-gray-800">

<!-- Navbar -->
<nav class="bg-white shadow-md fixed w-full z-20">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <!-- Logo -->
    <div class="font-bold text-xl text-blue-600">EduPlatform</div>

    <!-- Hamburger Button (shown on mobile) -->
    <button id="nav-toggle" class="md:hidden flex items-center px-3 py-2 border rounded text-gray-600 border-gray-600 hover:text-blue-600 hover:border-blue-600">
      <svg class="fill-current h-5 w-5" viewBox="0 0 20 20">
        <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"/>
      </svg>
    </button>

    <!-- Menu Links -->
    <div id="nav-menu" class="hidden md:flex space-x-4">
      <a href="courses.html" class="hover:text-blue-600 font-medium">Courses</a>
      <a href="../landing/index.html" class="hover:text-blue-600 font-medium">Home</a>
      <a href="#" class="hover:text-blue-600 font-medium">Login</a>
      <a href="#" class="hover:text-blue-600 font-medium">Sign Up</a>
    </div>
  </div>

  <!-- Mobile Menu (hidden by default) -->
  <div id="mobile-menu" class="md:hidden hidden px-6 pb-4">
    <a href="courses.html" class="block py-2 hover:text-blue-600">Courses</a>
    <a href="../landing/index.html" class="block py-2 hover:text-blue-600">Home</a>
    <a href="#" class="block py-2 hover:text-blue-600">Login</a>
    <a href="#" class="block py-2 hover:text-blue-600">Sign Up</a>
  </div>
</nav>

  <!-- Hero -->
  <header class="pt-24 pb-12 text-center bg-gradient-to-r from-blue-600 to-blue-400 text-white">
    <h1 class="text-4xl md:text-5xl font-bold mb-4 drop-shadow-lg">Explore Our Courses</h1>
    <p class="text-lg md:text-xl max-w-2xl mx-auto drop-shadow-md">
      Learn from the best teachers and boost your skills with high-quality video courses.
    </p>
  </header>

<!-- Courses Grid -->
<main class="flex-1 max-w-full mx-auto px-6 py-12">
<div id="courses-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10 justify-center">
  <!-- Cards will be injected here by JS -->
</div>

  </div>
</main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8">
    <div class="max-w-7xl mx-auto text-center space-y-2">
      <p>© 2026 EduPlatform. All rights reserved.</p>
      <p class="text-gray-400 text-sm">Designed for students and teachers worldwide.</p>
    </div>
  </footer>
<script>
  const navToggle = document.getElementById("nav-toggle");
  const mobileMenu = document.getElementById("mobile-menu");

  navToggle.addEventListener("click", () => {
    mobileMenu.classList.toggle("hidden");
  });
</script>
</body>
</html>
